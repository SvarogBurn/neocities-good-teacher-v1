<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr. Thorm's Classroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="desk">

    <!-- Top-center: torn header banner -->
    <div class="item header">
      <img src="assets/Header.png" alt="Mr. Thorm's Classroom" />
    </div>

    <!-- Top-right: rules note -->
    <div class="item rules">
      <img src="assets/rules_note.png" alt="Rules! Be respectful. All topics OK! Leave your insecurities at the door!" />
    </div>

    <!-- Board + polaroid (side by side on mobile) -->
    <div class="board-row">
      <!-- polaroid photo -->
      <div class="item polaroid">
        <img src="assets/polaroid.png" alt="Jackson Thorm - your teacher" />
      </div>
      <!-- chalkboard with intro -->
      <div class="item chalkboard">
        <img src="assets/chalkboard.jpg" alt="" />
        <p class="chalk-text">Welcome to my classroom &mdash; pull up a chair and stay a while.</p>
      </div>
    </div>

    <!-- Suggestion box (+ extra credit attached next to it) -->
    <div class="sugg-row">
      <!-- suggestion box (big) - click to toggle pink version -->
      <div class="item suggestion">
        <img id="suggestion-img" src="assets/suggestio_box.png" alt="Suggestion Box"
             data-normal="assets/suggestio_box.png"
             data-pink="assets/suggestio_box_pink.png" />
      </div>
      <!-- extra credit note -->
      <div class="item extra">
        <img src="assets/Extra_credit_note.png" alt="Extra Credit! Leave a nice review in the guestbook!" />
      </div>
    </div>

    <!-- Center-right: bot RP folder -->
    <div class="item botrp">
      <img src="assets/botRP.png" alt="Bot RP" />
    </div>

    <!-- Bottom-left: gallery note -->
    <div class="item gallery">
      <img src="assets/blank_note_whitepink.png" alt="" />
      <span class="gallery-label">gallery</span>
    </div>

    <!-- Bottom-right: red clipboard (empty) -->
    <div class="item clipboard">
      <img src="assets/red_clipboard_cropped.jpg" alt="" />
    </div>

    <!-- Decorative graffiti scribbled on the desk -->
    <div class="item graffiti-cat">
      <img src="assets/cat_graffiti.png" alt="" />
    </div>
    <div class="item graffiti-study">
      <img src="assets/study_hard_graffiti.png" alt="" />
    </div>
    <div class="item graffiti-cat-2">
      <img src="assets/cat_graffiti.png" alt="" />
    </div>
    <div class="item graffiti-study-2">
      <img src="assets/study_hard_graffiti.png" alt="" />
    </div>

    <!-- Star stickers -->
    <div class="item star">
      <img src="assets/gold_star_glitter.png" alt="" />
    </div>
    <div class="item star-2">
      <img src="assets/gold_star_glitter.png" alt="" />
    </div>
    <div class="item star-3">
      <img src="assets/gold_star_glitter.png" alt="" />
    </div>
    <div class="item star-4">
      <img src="assets/gold_star_glitter.png" alt="" />
    </div>

    <!-- Lipstick kisses -->
    <div class="item kiss">
      <img src="assets/glitter_kiss.png" alt="" />
    </div>
    <div class="item kiss-3">
      <img src="assets/glitter_kiss.png" alt="" />
    </div>

  </main>

  <script>
    // Toggle the suggestion box between its normal and pink versions on click.
    (function () {
      var img = document.getElementById('suggestion-img');
      if (!img) return;
      img.addEventListener('click', function () {
        var pink = img.getAttribute('data-pink');
        var normal = img.getAttribute('data-normal');
        var current = img.getAttribute('src');
        img.setAttribute('src', current.indexOf('pink') !== -1 ? normal : pink);
      });
    })();
  </script>

  <!-- Bottom of the page: rainbow crayon scribble, below everything -->
  <footer class="crayon">
    <img class="scribble" src="assets/crayon_rainboy.png" alt="" />
    <!-- The crayon mid-draw: tip touching the scribble -->
    <img class="red-crayon" src="assets/red_crayon.png" alt="" />
    <!-- More crayons scattered around, recoloured via hue-rotate -->
    <img class="crayon-bit c-blue"   src="assets/red_crayon.png" alt="" />
    <img class="crayon-bit c-green"  src="assets/red_crayon.png" alt="" />
    <img class="crayon-bit c-purple" src="assets/red_crayon.png" alt="" />
    <img class="crayon-bit c-yellow" src="assets/red_crayon.png" alt="" />
  </footer>
</body>
</html>
